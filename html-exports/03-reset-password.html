<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>비밀번호 재설정 - 모의투자</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-white min-h-screen flex flex-col items-center justify-center px-6">
  <div class="w-full max-w-sm">
    <a href="01-login.html" class="flex items-center gap-2 text-gray-600 mb-8 w-fit">
      <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
      <span class="text-sm">로그인으로 돌아가기</span>
    </a>

    <!-- Step 1: 이메일 입력 -->
    <div id="step-email">
      <div class="mb-8">
        <h2 class="text-2xl font-bold text-gray-900">비밀번호 재설정</h2>
        <p class="text-sm text-gray-500 mt-2">가입한 이메일로 인증코드를 발송합니다.</p>
      </div>
      <form class="space-y-4">
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1.5">이메일</label>
          <input type="email" placeholder="가입한 이메일 주소"
            class="w-full px-4 py-3 rounded-xl border border-gray-200 text-sm outline-none focus:border-blue-600 transition-all" />
        </div>
        <button type="button" onclick="showStep('verify')" class="w-full py-3.5 rounded-xl text-white font-semibold text-sm" style="background-color:#0046FF">
          인증코드 발송
        </button>
      </form>
    </div>

    <!-- Step 2: 인증코드 -->
    <div id="step-verify" class="hidden">
      <div class="mb-8">
        <h2 class="text-2xl font-bold text-gray-900">인증코드 입력</h2>
        <p class="text-sm text-gray-500 mt-2">
          <span class="font-medium text-gray-700">user@example.com</span>으로<br />
          발송된 6자리 인증코드를 입력해주세요.
        </p>
      </div>
      <form class="space-y-6">
        <div class="flex gap-2 justify-center">
          <input type="text" maxlength="1" class="w-12 h-12 text-center text-xl font-bold rounded-xl border-2 border-blue-600 bg-blue-50 text-blue-600 outline-none" value="1" />
          <input type="text" maxlength="1" class="w-12 h-12 text-center text-xl font-bold rounded-xl border-2 border-blue-600 bg-blue-50 text-blue-600 outline-none" value="2" />
          <input type="text" maxlength="1" class="w-12 h-12 text-center text-xl font-bold rounded-xl border-2 border-gray-200 text-gray-800 outline-none" />
          <input type="text" maxlength="1" class="w-12 h-12 text-center text-xl font-bold rounded-xl border-2 border-gray-200 text-gray-800 outline-none" />
          <input type="text" maxlength="1" class="w-12 h-12 text-center text-xl font-bold rounded-xl border-2 border-gray-200 text-gray-800 outline-none" />
          <input type="text" maxlength="1" class="w-12 h-12 text-center text-xl font-bold rounded-xl border-2 border-gray-200 text-gray-800 outline-none" />
        </div>
        <button type="button" onclick="showStep('reset')" class="w-full py-3.5 rounded-xl text-white font-semibold text-sm" style="background-color:#0046FF">
          인증 확인
        </button>
        <div class="flex items-center justify-center gap-2 text-sm">
          <span class="text-gray-400">코드를 받지 못했나요?</span>
          <button type="button" class="font-semibold" style="color:#0046FF">재발송</button>
        </div>
      </form>
    </div>

    <!-- Step 3: 새 비밀번호 -->
    <div id="step-reset" class="hidden">
      <div class="mb-8">
        <h2 class="text-2xl font-bold text-gray-900">새 비밀번호 설정</h2>
        <p class="text-sm text-gray-500 mt-2">새로운 비밀번호를 입력해주세요.</p>
      </div>
      <form class="space-y-4">
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1.5">새 비밀번호</label>
          <div class="relative">
            <input type="password" placeholder="8자 이상 입력"
              class="w-full px-4 py-3 rounded-xl border border-gray-200 text-sm outline-none focus:border-blue-600 pr-11" />
            <button type="button" class="absolute right-3 top-1/2 -translate-y-1/2 text-gray-400">
              <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
            </button>
          </div>
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1.5">비밀번호 확인</label>
          <div class="relative">
            <input type="password" placeholder="비밀번호 재입력"
              class="w-full px-4 py-3 rounded-xl border border-gray-200 text-sm outline-none focus:border-blue-600 pr-11" />
          </div>
        </div>
        <button type="button" onclick="showStep('done')" class="w-full py-3.5 rounded-xl text-white font-semibold text-sm" style="background-color:#0046FF">
          비밀번호 변경
        </button>
      </form>
    </div>

    <!-- Step 4: 완료 -->
    <div id="step-done" class="hidden flex flex-col items-center text-center">
      <div class="w-16 h-16 rounded-full bg-green-50 flex items-center justify-center mb-6 mx-auto">
        <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#22c55e" stroke-width="2"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>
      </div>
      <h2 class="text-xl font-bold text-gray-900">비밀번호 변경 완료</h2>
      <p class="text-sm text-gray-500 mt-3 leading-relaxed">
        비밀번호가 성공적으로 변경되었습니다.<br />새 비밀번호로 로그인해주세요.
      </p>
      <a href="01-login.html" class="mt-8 w-full py-3.5 rounded-xl text-white font-semibold text-sm text-center block" style="background-color:#0046FF">
        로그인하러 가기
      </a>
    </div>
  </div>

  <script>
    function showStep(step) {
      ['email','verify','reset','done'].forEach(s => {
        const el = document.getElementById('step-' + s);
        if (el) el.classList.add('hidden');
      });
      const target = document.getElementById('step-' + step);
      if (target) target.classList.remove('hidden');
    }
  </script>
</body>
</html>
