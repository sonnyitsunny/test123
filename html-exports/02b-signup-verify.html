<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>이메일 인증 - 모의투자</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-white min-h-screen flex flex-col items-center justify-center px-6">
  <div class="w-full max-w-sm">
    <div class="flex flex-col items-center mb-10">
      <div class="w-14 h-14 rounded-full flex items-center justify-center mb-4" style="background-color:#EBF0FF">
        <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#0046FF" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>
      </div>
      <h2 class="text-xl font-bold text-gray-900">이메일 인증</h2>
      <p class="text-sm text-gray-500 mt-2 text-center">
        <span class="font-medium text-gray-700">user@example.com</span>으로<br />인증 메일을 발송했습니다.
      </p>
    </div>
    <form class="space-y-4">
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1.5">인증 코드</label>
        <input type="text" placeholder="6자리 인증 코드 입력" maxlength="6"
          class="w-full px-4 py-3 rounded-xl border border-gray-200 text-sm outline-none focus:border-blue-600 tracking-widest text-center text-lg font-semibold" />
      </div>
      <button type="button" class="w-full py-3.5 rounded-xl text-white font-semibold text-sm" style="background-color:#0046FF">
        인증 완료
      </button>
    </form>
    <button class="mt-4 w-full text-sm text-gray-500 text-center">뒤로 가기</button>
  </div>
</body>
</html>
