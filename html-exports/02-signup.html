<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>회원가입 - 모의투자</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-white min-h-screen flex flex-col items-center justify-center px-6 py-10">
  <div class="w-full max-w-sm">
    <div class="flex flex-col items-center mb-8">
      <div class="w-12 h-12 rounded-2xl flex items-center justify-center mb-3" style="background-color:#0046FF">
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 6 13.5 15.5 8.5 10.5 1 18"/><polyline points="17 6 23 6 23 12"/></svg>
      </div>
      <h1 class="text-xl font-bold text-gray-900">회원가입</h1>
    </div>

    <form class="space-y-4">
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1.5">이메일</label>
        <input type="email" placeholder="example@email.com"
          class="w-full px-4 py-3 rounded-xl border border-gray-200 text-sm outline-none focus:border-blue-600 transition-all" />
      </div>

      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1.5">닉네임</label>
        <div class="flex gap-2">
          <input type="text" placeholder="닉네임 입력 (2~10자)"
            class="flex-1 px-4 py-3 rounded-xl border border-gray-200 text-sm outline-none focus:border-blue-600 transition-all" />
          <button type="button" class="px-4 py-3 rounded-xl text-sm font-medium border border-gray-200 text-gray-600 hover:border-blue-600 whitespace-nowrap">
            중복확인
          </button>
        </div>
      </div>

      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1.5">비밀번호</label>
        <div class="relative">
          <input type="password" placeholder="8자 이상 입력"
            class="w-full px-4 py-3 rounded-xl border border-gray-200 text-sm outline-none focus:border-blue-600 transition-all pr-11" />
          <button type="button" class="absolute right-3 top-1/2 -translate-y-1/2 text-gray-400">
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
          </button>
        </div>
      </div>

      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1.5">비밀번호 확인</label>
        <input type="password" placeholder="비밀번호 재입력"
          class="w-full px-4 py-3 rounded-xl border border-gray-200 text-sm outline-none focus:border-blue-600 transition-all" />
      </div>

      <button type="button" class="w-full py-3.5 rounded-xl text-white font-semibold text-sm mt-2" style="background-color:#0046FF">
        인증 메일 발송
      </button>
    </form>

    <div class="mt-6 text-center">
      <span class="text-sm text-gray-500">이미 계정이 있으신가요? </span>
      <a href="01-login.html" class="text-sm font-semibold" style="color:#0046FF">로그인</a>
    </div>
  </div>
</body>
</html>
