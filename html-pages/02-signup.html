<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1440">
<title>회원가입 - 모의투자</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, 'Apple SD Gothic Neo', 'Pretendard', 'Noto Sans KR', sans-serif; background: #fff; color: #111827; }
input { font-family: inherit; }
</style>
</head>
<body>
<div style="min-height:100vh;background:#fff;display:flex;align-items:center;justify-content:center;padding:40px 24px;">
  <div style="width:100%;max-width:360px;">

    <!-- Logo -->
    <div style="display:flex;flex-direction:column;align-items:center;margin-bottom:32px;">
      <div style="width:48px;height:48px;background:#0046FF;border-radius:14px;display:flex;align-items:center;justify-content:center;margin-bottom:12px;">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="23 6 13.5 15.5 8.5 10.5 1 18"/>
          <polyline points="17 6 23 6 23 12"/>
        </svg>
      </div>
      <h1 style="font-size:20px;font-weight:700;color:#111827;">회원가입</h1>
    </div>

    <!-- Form -->
    <div style="display:flex;flex-direction:column;gap:16px;">

      <!-- Email -->
      <div>
        <label style="display:block;font-size:14px;font-weight:500;color:#374151;margin-bottom:6px;">이메일</label>
        <input type="email" placeholder="example@email.com"
          style="width:100%;padding:12px 16px;border-radius:12px;border:1px solid #E5E7EB;font-size:14px;outline:none;" />
      </div>

      <!-- Nickname -->
      <div>
        <label style="display:block;font-size:14px;font-weight:500;color:#374151;margin-bottom:6px;">닉네임</label>
        <div style="display:flex;gap:8px;">
          <input type="text" placeholder="닉네임 입력 (2~10자)"
            style="flex:1;padding:12px 16px;border-radius:12px;border:1px solid #E5E7EB;font-size:14px;outline:none;" />
          <button style="padding:12px 16px;border-radius:12px;border:1px solid #E5E7EB;background:#F0FDF4;color:#16A34A;font-size:14px;font-weight:500;cursor:pointer;white-space:nowrap;">
            ✓ 확인됨
          </button>
        </div>
      </div>

      <!-- Password -->
      <div>
        <label style="display:block;font-size:14px;font-weight:500;color:#374151;margin-bottom:6px;">비밀번호</label>
        <div style="position:relative;">
          <input type="password" placeholder="8자 이상 입력"
            style="width:100%;padding:12px 44px 12px 16px;border-radius:12px;border:1px solid #E5E7EB;font-size:14px;outline:none;" />
          <div style="position:absolute;right:12px;top:50%;transform:translateY(-50%);color:#9CA3AF;">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
              <circle cx="12" cy="12" r="3"/>
            </svg>
          </div>
        </div>
      </div>

      <!-- Confirm Password -->
      <div>
        <label style="display:block;font-size:14px;font-weight:500;color:#374151;margin-bottom:6px;">비밀번호 확인</label>
        <input type="password" placeholder="비밀번호 재입력"
          style="width:100%;padding:12px 16px;border-radius:12px;border:1px solid #E5E7EB;font-size:14px;outline:none;" />
      </div>

      <!-- Submit Button -->
      <button style="width:100%;padding:14px;border-radius:12px;background:#0046FF;color:#fff;font-size:14px;font-weight:600;border:none;cursor:pointer;margin-top:8px;">
        인증 메일 발송
      </button>
    </div>

    <!-- Login link -->
    <div style="margin-top:24px;text-align:center;">
      <span style="font-size:14px;color:#6B7280;">이미 계정이 있으신가요? </span>
      <a href="#" style="font-size:14px;font-weight:600;color:#0046FF;text-decoration:none;">로그인</a>
    </div>

  </div>
</div>
</body>
</html>
