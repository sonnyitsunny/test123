<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1440">
<title>이메일 인증 - 모의투자</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, 'Apple SD Gothic Neo', 'Pretendard', 'Noto Sans KR', sans-serif; background: #fff; color: #111827; }
input { font-family: inherit; }
</style>
</head>
<body>
<div style="min-height:100vh;background:#fff;display:flex;align-items:center;justify-content:center;padding:24px;">
  <div style="width:100%;max-width:360px;">

    <!-- Icon & Title -->
    <div style="display:flex;flex-direction:column;align-items:center;margin-bottom:40px;">
      <div style="width:56px;height:56px;background:#EBF0FF;border-radius:50%;display:flex;align-items:center;justify-content:center;margin-bottom:16px;">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#0046FF" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/>
          <polyline points="22 4 12 14.01 9 11.01"/>
        </svg>
      </div>
      <h2 style="font-size:20px;font-weight:700;color:#111827;margin-bottom:8px;">이메일 인증</h2>
      <p style="font-size:14px;color:#6B7280;text-align:center;line-height:1.6;">
        <span style="font-weight:500;color:#374151;">kim@example.com</span>으로<br />인증 메일을 발송했습니다.
      </p>
    </div>

    <!-- Form -->
    <div style="display:flex;flex-direction:column;gap:16px;">
      <div>
        <label style="display:block;font-size:14px;font-weight:500;color:#374151;margin-bottom:6px;">인증 코드</label>
        <input type="text" placeholder="6자리 인증 코드 입력" maxlength="6"
          style="width:100%;padding:12px 16px;border-radius:12px;border:1px solid #E5E7EB;font-size:20px;font-weight:600;text-align:center;letter-spacing:8px;outline:none;" />
      </div>
      <button style="width:100%;padding:14px;border-radius:12px;background:#0046FF;color:#fff;font-size:14px;font-weight:600;border:none;cursor:pointer;">
        인증 완료
      </button>
    </div>

    <button style="margin-top:16px;width:100%;font-size:14px;color:#6B7280;background:none;border:none;cursor:pointer;padding:8px;">
      뒤로 가기
    </button>

  </div>
</div>
</body>
</html>
