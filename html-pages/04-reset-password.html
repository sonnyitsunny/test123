<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1440">
<title>비밀번호 재설정 - 모의투자</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, 'Apple SD Gothic Neo', 'Pretendard', 'Noto Sans KR', sans-serif; background: #fff; color: #111827; }
input { font-family: inherit; }
</style>
</head>
<body>
<div style="min-height:100vh;background:#fff;display:flex;align-items:center;justify-content:center;padding:24px;">
  <div style="width:100%;max-width:360px;">

    <!-- Back link -->
    <a href="#" style="display:flex;align-items:center;gap:8px;color:#4B5563;font-size:14px;text-decoration:none;margin-bottom:32px;">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <line x1="19" y1="12" x2="5" y2="12"/>
        <polyline points="12 19 5 12 12 5"/>
      </svg>
      로그인으로 돌아가기
    </a>

    <!-- Title -->
    <div style="margin-bottom:32px;">
      <h2 style="font-size:24px;font-weight:700;color:#111827;margin-bottom:8px;">비밀번호 재설정</h2>
      <p style="font-size:14px;color:#6B7280;line-height:1.6;">가입한 이메일로 재설정 링크를 발송합니다.<br />링크 유효 시간은 30분입니다.</p>
    </div>

    <!-- Form -->
    <div style="display:flex;flex-direction:column;gap:16px;">
      <div>
        <label style="display:block;font-size:14px;font-weight:500;color:#374151;margin-bottom:6px;">이메일</label>
        <input type="email" placeholder="가입한 이메일 주소"
          style="width:100%;padding:12px 16px;border-radius:12px;border:1px solid #0046FF;box-shadow:0 0 0 3px rgba(0,70,255,0.08);font-size:14px;outline:none;" />
      </div>
      <button style="width:100%;padding:14px;border-radius:12px;background:#0046FF;color:#fff;font-size:14px;font-weight:600;border:none;cursor:pointer;">
        재설정 링크 발송
      </button>
    </div>

  </div>
</div>
</body>
</html>
